<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LTS Logistik Agent</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0B0E11; overflow: hidden; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #252D3A; border-radius: 2px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
    textarea::placeholder { color: #4A5568; }
    button:hover:not(:disabled) { filter: brightness(1.2); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const MODULES = [
  { id: "overview",   label: "Übersicht",        icon: "◎" },
  { id: "dienstplan", label: "Dienstplanung",     icon: "◷" },
  { id: "flotte",     label: "Flottenverwaltung", icon: "⬡" },
  { id: "kpi",        label: "KPI & Reporting",   icon: "◈" },
  { id: "excel",      label: "Excel-Agent",       icon: "▦" },
];
const LOCATIONS = ["MUC", "VIE", "FRA"];

const p = {
  bg:"#0B0E11", surface:"#141820", surfaceAlt:"#1A1F2B",
  border:"#252D3A", borderLight:"#2E3847",
  accent:"#3B82F6", accentDim:"#1E3A5F",
  success:"#10B981", warning:"#F59E0B", danger:"#EF4444",
  text:"#E2E8F0", textMuted:"#8694A8", textDim:"#4A5568",
};

function AgentApp() {
  const [activeModule, setActiveModule]     = useState("overview");
  const [messages, setMessages]             = useState([]);
  const [input, setInput]                   = useState("");
  const [loading, setLoading]               = useState(false);
  const [uploadedFiles, setUploadedFiles]   = useState([]);
  const [activeLocation, setActiveLocation] = useState("ALL");
  const [agentLog, setAgentLog]             = useState([]);
  const [sidebarOpen, setSidebarOpen]       = useState(true);
  const chatRef = useRef(null);
  const fileRef = useRef(null);

  const addLog = useCallback((text) => {
    setAgentLog(prev => [...prev.slice(-49), { time: new Date().toLocaleTimeString("de-DE"), text }]);
  }, []);

  useEffect(() => { addLog("Agent initialisiert — bereit für Aufgaben"); }, [addLog]);
  useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [messages]);

  const buildSystemPrompt = () =>
    `Du bist ein KI-Logistik-Agent für LTS Transport u. Logistik GmbH mit ~200 Fahrzeugen und ~300 Mitarbeitern an den Standorten MUC (München), VIE (Wien) und FRA (Frankfurt).

Deine Aufgabenbereiche:
1. DIENSTPLANUNG: Schichtplanung, Fahrerplanung, Urlaubsverwaltung, Verfügbarkeiten
2. FLOTTENVERWALTUNG: Fahrzeugstatus, Wartungszyklen, Reinigungsintervalle (Wäsche/Innen/Kühlkoffer), TÜV-Termine
3. KPI & REPORTING: Fahrer-KPIs (Early%, Delays%, Ladezeit, Kundenbewertung, Schäden), Standortvergleiche, Nachschulungsempfehlungen
4. EXCEL-VERARBEITUNG: Daten analysieren, zusammenfassen, Berichte erstellen, Formeln vorschlagen

Aktiver Standortfilter: ${activeLocation === "ALL" ? "Alle Standorte" : activeLocation}
Aktives Modul: ${MODULES.find(m => m.id === activeModule)?.label}

Antworte immer auf Deutsch. Sei präzise, operativ und lösungsorientiert.
Formatiere Tabellen wenn sinnvoll mit | Spalte | Format.`;

  const sendMessage = async (text, fileData = null) => {
    if (!text.trim() && !fileData) return;
    const userMsg = { role: "user", text: text || "Datei hochgeladen — bitte analysieren.", ts: Date.now() };
    setMessages(prev => [...prev, userMsg]);
    setInput("");
    setLoading(true);
    addLog(`Verarbeite: "${(text || "Dateianalyse").slice(0, 60)}..."`);

    try {
      const contentBlocks = [];
      if (fileData) {
        contentBlocks.push({ type: "document", source: { type: "base64", media_type: fileData.type, data: fileData.base64 } });
      }
      contentBlocks.push({ type: "text", text: text || "Analysiere diese Datei und gib eine strukturierte Zusammenfassung." });

      const apiMessages = messages
        .slice(-10)
        .map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.text }))
        .concat([{ role: "user", content: contentBlocks.length === 1 && !fileData ? text : contentBlocks }]);

      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-5",
          max_tokens: 2000,
          system: buildSystemPrompt(),
          messages: apiMessages,
        }),
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || `Fehler ${response.status}`);
      const reply = data.content?.map(c => c.text || "").join("\n") || "Keine Antwort erhalten.";
      setMessages(prev => [...prev, { role: "assistant", text: reply, ts: Date.now() }]);
      addLog("Antwort erhalten ✓");
    } catch (err) {
      setMessages(prev => [...prev, { role: "assistant", text: `⚠ Fehler: ${err.message}`, ts: Date.now() }]);
      addLog(`Fehler: ${err.message}`);
    }
    setLoading(false);
  };

  const handleFileUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    addLog(`Datei: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`);
    const reader = new FileReader();
    reader.onload = () => {
      const base64 = reader.result.split(",")[1];
      const fileData = { name: file.name, type: file.type || "application/octet-stream", base64 };
      setUploadedFiles(prev => [...prev, { name: file.name, size: file.size, ts: Date.now() }]);
      const prompts = {
        dienstplan: `Analysiere diese Datei für die Dienstplanung. Identifiziere: Schichtzeiten, Fahrerzuordnungen, Lücken, Überstunden, Konflikte. Standort: ${activeLocation}`,
        flotte:     `Analysiere diese Datei für die Flottenverwaltung. Identifiziere: Fahrzeugstatus, fällige Wartungen, Reinigungszyklen, TÜV-Termine. Standort: ${activeLocation}`,
        kpi:        `Analysiere diese KPI-Datei. Berechne Durchschnittswerte, Standortvergleich, Nachschulungsbedarf (Early <85%, Delays >5%, Rating <3.5). Standort: ${activeLocation}`,
        excel:      `Analysiere diese Datei vollständig. Gib Zusammenfassung, Datenstruktur, Auffälligkeiten und Handlungsempfehlungen.`,
        overview:   `Analysiere diese Datei und ordne sie dem passenden Bereich zu. Gib eine strukturierte Zusammenfassung.`,
      };
      sendMessage(prompts[activeModule] || prompts.overview, fileData);
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const quickActions = {
    overview: [
      { label:"Tagesbericht",  prompt:"Erstelle einen Tagesbericht über alle Standorte: offene Aufgaben, kritische Fahrzeuge, KPI-Auffälligkeiten." },
      { label:"Wochenstatus",  prompt:"Gib mir den Wochenstatus: Personalverfügbarkeit, Fahrzeugauslastung, KPI-Trends für alle drei Standorte." },
    ],
    dienstplan: [
      { label:"Schichtlücken",     prompt:`Prüfe den Dienstplan auf Lücken und unbesetzte Schichten. Standort: ${activeLocation}` },
      { label:"Überstunden-Check", prompt:`Identifiziere Fahrer mit kritischen Überstunden. Standort: ${activeLocation}` },
      { label:"Urlaubskonflikte",  prompt:`Prüfe auf Urlaubskonflikte und Mindestbesetzung. Standort: ${activeLocation}` },
    ],
    flotte: [
      { label:"Wartung fällig",  prompt:`Welche Fahrzeuge haben überfällige Wartungen? Standort: ${activeLocation}` },
      { label:"TÜV-Termine",     prompt:`Liste alle Fahrzeuge mit TÜV-Termin in den nächsten 30 Tagen. Standort: ${activeLocation}` },
      { label:"Fahrzeugstatus",  prompt:`Gib eine Übersicht aller Fahrzeuge: aktiv, in Werkstatt, außer Betrieb. Standort: ${activeLocation}` },
    ],
    kpi: [
      { label:"Top/Flop Fahrer",    prompt:`Zeige die Top 5 und Flop 5 Fahrer nach Gesamtbewertung. Standort: ${activeLocation}` },
      { label:"Nachschulungsliste", prompt:`Erstelle eine Nachschulungsliste: Early <85%, Delays >5% oder Rating <3.5. Standort: ${activeLocation}` },
      { label:"Standortvergleich",  prompt:"Vergleiche die KPIs aller drei Standorte und identifiziere Best Practices." },
    ],
    excel: [
      { label:"Datei zusammenfassen", prompt:"Fasse die zuletzt hochgeladene Datei zusammen: Struktur, Spalten, Auffälligkeiten." },
      { label:"Formelvorschläge",     prompt:"Welche Excel-Formeln wären für diese Daten sinnvoll? Gib konkrete Beispiele." },
    ],
  };

  const mono = "'JetBrains Mono','SF Mono','Fira Code',monospace";

  return (
    <div style={{ display:"flex", height:"100vh", background:p.bg, color:p.text, fontFamily:mono, fontSize:13, overflow:"hidden" }}>
      <div style={{ width:sidebarOpen?220:56, background:p.surface, borderRight:`1px solid ${p.border}`, display:"flex", flexDirection:"column", transition:"width 0.2s ease", flexShrink:0, overflow:"hidden" }}>
        <div style={{ padding:"16px 14px", borderBottom:`1px solid ${p.border}`, display:"flex", alignItems:"center", gap:10, cursor:"pointer", minHeight:56 }} onClick={()=>setSidebarOpen(!sidebarOpen)}>
          <div style={{ width:28, height:28, background:`linear-gradient(135deg,${p.accent},#6366F1)`, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:14, flexShrink:0 }}>L</div>
          {sidebarOpen && <span style={{ fontWeight:600, fontSize:14, whiteSpace:"nowrap" }}>LTS Agent</span>}
        </div>
        <div style={{ flex:1, padding:"8px 6px" }}>
          {MODULES.map(m => (
            <div key={m.id} onClick={()=>setActiveModule(m.id)} style={{ display:"flex", alignItems:"center", gap:10, padding:"10px", borderRadius:6, cursor:"pointer", background:activeModule===m.id?p.accentDim:"transparent", color:activeModule===m.id?p.accent:p.textMuted, marginBottom:2, transition:"all 0.15s", whiteSpace:"nowrap" }}>
              <span style={{ fontSize:16, width:24, textAlign:"center", flexShrink:0 }}>{m.icon}</span>
              {sidebarOpen && <span style={{ fontSize:12, fontWeight:activeModule===m.id?600:400 }}>{m.label}</span>}
            </div>
          ))}
        </div>
        {sidebarOpen && (
          <div style={{ padding:"12px 10px", borderTop:`1px solid ${p.border}` }}>
            <div style={{ fontSize:10, color:p.textDim, marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Standort</div>
            <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
              {["ALL",...LOCATIONS].map(loc => (
                <div key={loc} onClick={()=>setActiveLocation(loc)} style={{ padding:"4px 8px", borderRadius:4, fontSize:10, cursor:"pointer", background:activeLocation===loc?p.accent:p.surfaceAlt, color:activeLocation===loc?"#fff":p.textMuted, fontWeight:600 }}>
                  {loc==="ALL"?"ALLE":loc}
                </div>
              ))}
            </div>
          </div>
        )}
        {sidebarOpen && uploadedFiles.length > 0 && (
          <div style={{ padding:"8px 10px", borderTop:`1px solid ${p.border}`, maxHeight:120, overflowY:"auto" }}>
            <div style={{ fontSize:10, color:p.textDim, marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>Dateien</di
